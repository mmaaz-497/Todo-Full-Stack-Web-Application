# OCI deployment values
global:
  imageRegistry: "me-dubai-1.ocir.io/axe9g96xp1gn"
  imagePullSecrets: []

# Use placeholder images for demonstration
apiService:
  image:
    repository: "todo-api-service"  # Placeholder - would be replaced with actual image
    tag: "latest"
    pullPolicy: "Always"

recurringTaskService:
  image:
    repository: "todo-recurring-task-service"  # Placeholder - would be replaced with actual image
    tag: "latest"
    pullPolicy: "Always"

notificationService:
  image:
    repository: "todo-notification-service"  # Placeholder - would be replaced with actual image
    tag: "latest"
    pullPolicy: "Always"

auditService:
  image:
    repository: "todo-audit-service"  # Placeholder - would be replaced with actual image
    tag: "latest"
    pullPolicy: "Always"

websocketSyncService:
  image:
    repository: "todo-websocket-sync-service"  # Placeholder - would be replaced with actual image
    tag: "latest"
    pullPolicy: "Always"

# Enable services that are needed
recurringTaskService:
  enabled: true
notificationService:
  enabled: true
auditService:
  enabled: true
websocketSyncService:
  enabled: true

# Use external database (you'll need to set up an Oracle Autonomous Database or similar)
externalDatabase:
  enabled: true
  host: "your-db-host.adb.me-dubai-1.oraclecloudapps.com"  # Replace with actual DB host
  port: 1521
  username: "your_username"
  password: "your_password"
  database: "your_database"
  sslMode: "require"

# Disable local Kafka since we'd typically use Oracle Stream or external Kafka
kafka:
  enabled: false

# Enable monitoring
monitoring:
  enabled: true

# Enable ingress for external access
ingress:
  enabled: false  # Temporarily disabling ingress to avoid issues
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: "todo-app.example.com"  # Replace with your domain
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: todo-backend  # Using the correct service name from the chart
              port:
                number: 8000
  tls:
    - secretName: todo-tls-secret
      hosts:
        - "todo-app.example.com"  # Replace with your domain