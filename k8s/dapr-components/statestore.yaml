apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: taskflow
spec:
  type: state.postgresql
  version: v1
  metadata:
    - name: connectionString
      secretKeyRef:
        name: db-secrets
        key: connection-string
    - name: tableName
      value: "dapr_state"
    - name: metadataTableName
      value: "dapr_metadata"
    - name: keyLength
      value: "200"