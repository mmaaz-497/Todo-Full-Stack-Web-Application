---
# Recurring Task Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recurring-task-service
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recurring-task-service
  template:
    metadata:
      labels:
        app: recurring-task-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "recurring-task-service"
        dapr.io/app-port: "8001"
    spec:
      containers:
      - name: recurring-task-service
        image: recurring-task-service:v1.0.0
        imagePullPolicy: IfNotPresent  # Use registry image in production
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "taskflow-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: BACKEND_SERVICE_URL
          value: "http://backend-service:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# Notification Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "notification-service"
        dapr.io/app-port: "8002"
    spec:
      containers:
      - name: notification-service
        image: notification-service:v1.0.0
        imagePullPolicy: IfNotPresent  # Use registry image in production
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "taskflow-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: email-secrets
              key: smtp-host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: email-secrets
              key: smtp-port
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: email-secrets
              key: smtp-user
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: email-secrets
              key: smtp-password
        - name: SMTP_FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: email-secrets
              key: smtp-from
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# Audit Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "audit-service"
        dapr.io/app-port: "8003"
    spec:
      containers:
      - name: audit-service
        image: audit-service:v1.0.0
        imagePullPolicy: IfNotPresent  # Use registry image in production
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "taskflow-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: connection-string
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"